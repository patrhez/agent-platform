agent:
  id: issue-troubleshooter
  version: 2026-07-19.2
  runtime: eino-react
  model:
    api_mode: chat_completions
    model: ${LLM_MODEL}
    temperature: 1
  limits:
    max_steps: 50
    run_timeout_seconds: 600
  context:
    summarization:
      enabled: true
      context_tokens: 120000
      context_messages: 0
    reduction:
      enabled: true
      max_tokens_for_clear: 80000
      max_length_for_trunc: 32000
      skip_offload: true
  mcp_servers:
    - key: workspace
      url: ${WORKSPACE_MCP_URL}
      allowed_tools: [workspace.list_repositories, file.list, file.stat, code.search, file.read]
      safe_arguments:
        file.list: [repo, path, glob, maxDepth, maxEntries]
        file.stat: [repo, path]
        code.search: [repo, query, pathPrefix, glob, maxResults, regex, caseInsensitive]
        file.read: [repo, path, startLine, endLine]
  skills_bundle_version: 2026-07-19.2
