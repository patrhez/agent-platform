apiVersion: apps/v1
kind: Deployment
metadata:
  name: workspace-mcp
  namespace: agent-platform-ha
  labels:
    app.kubernetes.io/part-of: agent-platform
    app.kubernetes.io/component: mcp
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: workspace-mcp
  template:
    metadata:
      labels:
        app.kubernetes.io/name: workspace-mcp
        app.kubernetes.io/part-of: agent-platform
        app.kubernetes.io/component: mcp
    spec:
      containers:
        - name: workspace-mcp
          image: agent-platform-workspace-mcp:ha
          imagePullPolicy: IfNotPresent
          env:
            - name: WORKSPACE_ROOT
              value: /workspace/repos
          ports:
            - name: http
              containerPort: 8081
          readinessProbe:
            httpGet:
              path: /healthz
              port: http
            periodSeconds: 2
            timeoutSeconds: 1
          livenessProbe:
            httpGet:
              path: /healthz
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
          volumeMounts:
            - name: repositories
              mountPath: /workspace/repos
              readOnly: true
      volumes:
        - name: repositories
          hostPath:
            path: /workspace/repos
            type: Directory
---
apiVersion: v1
kind: Service
metadata:
  name: workspace-mcp
  namespace: agent-platform-ha
spec:
  selector:
    app.kubernetes.io/name: workspace-mcp
  ports:
    - name: http
      port: 8081
      targetPort: http
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: api
  namespace: agent-platform-ha
  labels:
    app.kubernetes.io/part-of: agent-platform
    app.kubernetes.io/component: api
spec:
  replicas: 3
  selector:
    matchLabels:
      app.kubernetes.io/name: api
  template:
    metadata:
      labels:
        app.kubernetes.io/name: api
        app.kubernetes.io/part-of: agent-platform
        app.kubernetes.io/component: api
    spec:
      terminationGracePeriodSeconds: 5
      affinity:
        podAntiAffinity:
          preferredDuringSchedulingIgnoredDuringExecution:
            - weight: 100
              podAffinityTerm:
                topologyKey: kubernetes.io/hostname
                labelSelector:
                  matchLabels:
                    app.kubernetes.io/name: api
      containers:
        - name: api
          image: agent-platform-api:ha
          imagePullPolicy: IfNotPresent
          envFrom:
            - configMapRef:
                name: agent-platform-config
            - secretRef:
                name: agent-platform-runtime
          env:
            - name: INSTANCE_ID
              valueFrom:
                fieldRef:
                  fieldPath: metadata.name
          ports:
            - name: http
              containerPort: 8080
          readinessProbe:
            httpGet:
              path: /healthz
              port: http
            periodSeconds: 2
            timeoutSeconds: 1
          livenessProbe:
            httpGet:
              path: /healthz
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
---
apiVersion: v1
kind: Service
metadata:
  name: api
  namespace: agent-platform-ha
spec:
  selector:
    app.kubernetes.io/name: api
  ports:
    - name: http
      port: 8080
      targetPort: http
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: worker
  namespace: agent-platform-ha
  labels:
    app.kubernetes.io/part-of: agent-platform
    app.kubernetes.io/component: worker
spec:
  replicas: 2
  selector:
    matchLabels:
      app.kubernetes.io/name: worker
  template:
    metadata:
      labels:
        app.kubernetes.io/name: worker
        app.kubernetes.io/part-of: agent-platform
        app.kubernetes.io/component: worker
    spec:
      terminationGracePeriodSeconds: 5
      affinity:
        podAntiAffinity:
          preferredDuringSchedulingIgnoredDuringExecution:
            - weight: 100
              podAffinityTerm:
                topologyKey: kubernetes.io/hostname
                labelSelector:
                  matchLabels:
                    app.kubernetes.io/name: worker
      containers:
        - name: worker
          image: agent-platform-worker:ha
          imagePullPolicy: IfNotPresent
          envFrom:
            - configMapRef:
                name: agent-platform-config
            - secretRef:
                name: agent-platform-runtime
          env:
            - name: WORKER_ID
              valueFrom:
                fieldRef:
                  fieldPath: metadata.name
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: web
  namespace: agent-platform-ha
  labels:
    app.kubernetes.io/part-of: agent-platform
    app.kubernetes.io/component: web
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: web
  template:
    metadata:
      labels:
        app.kubernetes.io/name: web
        app.kubernetes.io/part-of: agent-platform
        app.kubernetes.io/component: web
    spec:
      containers:
        - name: web
          image: agent-platform-web:ha
          imagePullPolicy: IfNotPresent
          ports:
            - name: http
              containerPort: 80
          readinessProbe:
            httpGet:
              path: /
              port: http
            periodSeconds: 2
            timeoutSeconds: 1
---
apiVersion: v1
kind: Service
metadata:
  name: web
  namespace: agent-platform-ha
spec:
  selector:
    app.kubernetes.io/name: web
  ports:
    - name: http
      port: 80
      targetPort: http
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: agent-platform
  namespace: agent-platform-ha
spec:
  ingressClassName: traefik
  rules:
    - http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: web
                port:
                  name: http
