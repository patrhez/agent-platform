x-build-proxy: &build-proxy
  HTTP_PROXY: ${DOCKER_PROXY_URL:-}
  HTTPS_PROXY: ${DOCKER_PROXY_URL:-}
  ALL_PROXY: ${DOCKER_ALL_PROXY_URL:-}
  NO_PROXY: ${DOCKER_NO_PROXY:-localhost,127.0.0.1,mysql,redis,api,worker,workspace-mcp,web}

services:
  mysql:
    image: mysql:8.4
    environment:
      MYSQL_DATABASE: ${MYSQL_DATABASE}
      MYSQL_USER: ${MYSQL_USER}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD}
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
    ports: ["3306:3306"]
    volumes: ["mysql-data:/var/lib/mysql"]
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-p${MYSQL_ROOT_PASSWORD}"]
      interval: 5s
      timeout: 3s
      retries: 20

  migrate:
    build:
      context: ./backend
      dockerfile: docker/migrate.Dockerfile
      args: *build-proxy
    environment:
      MYSQL_DSN: "${MYSQL_USER}:${MYSQL_PASSWORD}@tcp(mysql:3306)/${MYSQL_DATABASE}?parseTime=true&charset=utf8mb4&loc=UTC"
    depends_on:
      mysql: {condition: service_healthy}
    restart: "no"

  redis:
    image: redis:7.4-alpine
    ports: ["6379:6379"]
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 20

  api:
    build:
      context: ./backend
      dockerfile: docker/api.Dockerfile
      args: *build-proxy
    environment:
      MYSQL_DSN: "${MYSQL_USER}:${MYSQL_PASSWORD}@tcp(mysql:3306)/${MYSQL_DATABASE}?parseTime=true&charset=utf8mb4&loc=UTC"
      REDIS_URL: redis://redis:6379/0
      LLM_BASE_URL: ${LLM_BASE_URL}
      LLM_API_KEY: ${LLM_API_KEY}
      LLM_MODEL: ${LLM_MODEL}
      WORKSPACE_MCP_URL: http://workspace-mcp:8081/mcp
      WORKER_ID: ${WORKER_ID}
    depends_on:
      migrate: {condition: service_completed_successfully}
      redis: {condition: service_healthy}
    ports: ["8080:8080"]
    healthcheck:
      test: ["CMD-SHELL", "wget -q -O /dev/null http://localhost:8080/healthz"]
      interval: 5s
      timeout: 3s
      retries: 20

  worker:
    build:
      context: ./backend
      dockerfile: docker/worker.Dockerfile
      args: *build-proxy
    environment:
      MYSQL_DSN: "${MYSQL_USER}:${MYSQL_PASSWORD}@tcp(mysql:3306)/${MYSQL_DATABASE}?parseTime=true&charset=utf8mb4&loc=UTC"
      REDIS_URL: redis://redis:6379/0
      LLM_BASE_URL: ${LLM_BASE_URL}
      LLM_API_KEY: ${LLM_API_KEY}
      LLM_MODEL: ${LLM_MODEL}
      WORKSPACE_MCP_URL: http://workspace-mcp:8081/mcp
      WORKER_ID: ${WORKER_ID}
      AGENT_CONFIG_PATH: /etc/agent-platform/issue-troubleshooter.yaml
    depends_on:
      migrate: {condition: service_completed_successfully}
      redis: {condition: service_healthy}
      workspace-mcp: {condition: service_healthy}

  workspace-mcp:
    build:
      context: ./mcp-server
      dockerfile: Dockerfile
      args: *build-proxy
    volumes: ["${REPOS_DIR}:/workspace/repos:ro"]
    environment:
      WORKSPACE_ROOT: /workspace/repos
    ports: ["8081:8081"]
    healthcheck:
      test: ["CMD-SHELL", "wget -q -O /dev/null http://localhost:8081/healthz"]
      interval: 5s
      timeout: 3s
      retries: 20

  web:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args: *build-proxy
    depends_on:
      api: {condition: service_healthy}
    ports: ["5173:80"]

volumes:
  mysql-data:
